<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Neury Salomón">
    <meta name="copyright" content="Neury Hernández">
  <title>Inicio de Sesión</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="container">
    <h1>Iniciar Sesión</h1>
    <form id="loginForm">
      <label for="usuario">Usuario:</label>
      <input type="text" id="usuario" name="usuario" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Entrar</button>
    </form>
    <p id="mensaje"></p>
    <h6>¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></h6>
  </div>

  <script>
  document.getElementById("loginForm").addEventListener("submit", function(event){
      event.preventDefault();

      const usuarioIngresado = document.getElementById("usuario").value;
      const passwordIngresado = document.getElementById("password").value;

      const usuarioGuardado = localStorage.getItem("usuario");
      const passwordGuardado = localStorage.getItem("password");

      if(usuarioIngresado === usuarioGuardado && passwordIngresado === passwordGuardado){
        alert("Inicio de sesión exitoso");
        window.location.href = "dashboard.html"; // redirige al panel
      } else {
        document.getElementById("mensaje").textContent = "Usuario o contraseña incorrectos.";
        document.getElementById("mensaje").style.color = "red";
      }
    });
  </script>
</body>
</html>
