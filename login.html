<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Neury Salomón">
  <title>Iniciar Sesión - Red Social Extracurricular</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0066cc 0%, #004080 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      color: #0066cc;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #666;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    input[type="text"]:hover:not(:focus),
    input[type="password"]:hover:not(:focus) {
      border-color: #00aaff;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    button[type="submit"] {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #0066cc 0%, #004080 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="reset"] {
      flex: 1;
      padding: 12px;
      background: #f0f0f0;
      color: #333;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button[type="reset"]:hover {
      background: #e8e8e8;
      border-color: #0066cc;
      color: #0066cc;
    }

    .message-container {
      min-height: 25px;
      margin-bottom: 15px;
    }

    #mensaje {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
    }

    #mensaje.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ff9800;
    }

    #mensaje.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #4caf50;
    }

    .login-footer {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .login-footer p {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .login-footer a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .login-footer a:hover {
      color: #004080;
      text-decoration: underline;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #0066cc;
    }

    .remember-me label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 15px;
    }

    .forgot-password a {
      color: #0066cc;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }

      .form-actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Iniciar Sesión</h1>
      <p>Accede a tu cuenta para ver tus actividades</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="usuario">Usuario o Email:</label>
        <input 
          type="text" 
          id="usuario" 
          name="usuario" 
          placeholder="Ingresa tu usuario"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Ingresa tu contraseña"
          required
        >
      </div>

      <div class="remember-me">
        <input type="checkbox" id="recuerdame" name="recuerdame">
        <label for="recuerdame">Recuérdame</label>
      </div>

      <div class="forgot-password">
        <a href="#" onclick="alert('Función de recuperación próximamente'); return false;">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <div class="message-container">
        <div id="mensaje"></div>
      </div>

      <div class="form-actions">
        <button type="submit">Entrar</button>
        <button type="reset">Limpiar</button>
      </div>
    </form>

    <div class="login-footer">
      <p>¿No tienes una cuenta?</p>
      <a href="registro.html">Crear cuenta ahora</a>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const usuarioIngresado = document.getElementById("usuario").value.trim();
      const passwordIngresado = document.getElementById("password").value;
      const recuerdame = document.getElementById("recuerdame").checked;

      const usuarioGuardado = localStorage.getItem("usuario");
      const passwordGuardado = localStorage.getItem("password");
      const mensajeDiv = document.getElementById("mensaje");

      // Validación básica
      if (!usuarioIngresado || !passwordIngresado) {
        mensajeDiv.textContent = "⚠️ Por favor completa todos los campos";
        mensajeDiv.className = "error";
        return;
      }

      // Verificación de credenciales
      if (usuarioIngresado === usuarioGuardado && passwordIngresado === passwordGuardado) {
        // Mostrar mensaje de éxito
        mensajeDiv.textContent = "✅ ¡Inicio de sesión exitoso! Redirigiendo...";
        mensajeDiv.className = "success";
        
        // Guardar preferencia de "recuérdame"
        if (recuerdame) {
          localStorage.setItem("recuerdame", "true");
          localStorage.setItem("usuarioGuardado", usuarioIngresado);
        }

        // Redirigir después de 1.5 segundos
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      } else {
        // Error de credenciales
        mensajeDiv.textContent = "❌ Usuario o contraseña incorrectos";
        mensajeDiv.className = "error";
        
        // Limpiar campo de contraseña por seguridad
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });

    // Cargar usuario guardado si existe
    window.addEventListener("DOMContentLoaded", () => {
      const recuerdame = localStorage.getItem("recuerdame");
      const usuarioGuardado = localStorage.getItem("usuarioGuardado");
      
      if (recuerdame === "true" && usuarioGuardado) {
        document.getElementById("usuario").value = usuarioGuardado;
        document.getElementById("recuerdame").checked = true;
        document.getElementById("password").focus();
      }
    });
  </script>
</body>
</html>
