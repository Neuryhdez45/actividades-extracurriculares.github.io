<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Neury Salomón">
  <meta name="copyright" content="Neury Hernández">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Inscripción</title>
  <link rel="stylesheet" href="css/formulario.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Formulario de Inscripción</h1>
      <p>Completa tus datos para participar en la actividad.</p>
      <h6>Nota: Todos los campos marcados con * son obligatorios.</h6>
      <h6>Si no eres mayor de 10 años, no puedes inscribirte.</h6>
    </header>

   
    <form action="gracias.html" method="post">
   
      <label for="nombre">Nombre completo: *</label>
      <input type="text" id="nombre" name="nombre" required>
      <label for="edad">Edad: *</label>
      <input type="number" id="edad" name="edad" min="10" max="30" required>

   
      <label for="email">Correo electrónico: *</label>
      <input type="email" id="email" name="email" required>

   
      <label for="telefono">Teléfono: *</label>
      <input type="tel" id="telefono" name="telefono" required >


      <label for="actividad">Actividad: *</label>
      <select id="actividad" name="actividad" required>
        <option value="">Seleccione una actividad</option>
        <option value="futbol">Torneo de Fútbol</option>
        <option value="arte">Concurso de Arte</option>
        <option value="hackathon">Hackathon</option>
        <option value="musica">Festival de Música</option>
        <option value="teatro">Obra de Teatro</option>
        <option value="ajedrez">Torneo de Ajedrez</option>
        <option value="taekwondo">Competencia de Taekwondo</option>
        <option value="ciberseguridad">Curso de Ciberseguridad</option>
        <option value="basquetball">Practica de Basquetball</option>
      </select>
     

      <label for="comentarios">Comentarios adicionales:</label>
      <textarea id="comentarios" name="comentarios" rows="4"></textarea>

    
      <button type="submit">Enviar inscripción</button>
    </form>

    <footer>
      <p>&copy; 2026 CreativaWeb Studio - Proyecto académico</p>
    </footer>
  </div>
</body>
</html>
