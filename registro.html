<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Neury Salomón">
  <title>Registro de Usuario - Red Social Extracurricular</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .registro-container {
      width: 100%;
      max-width: 420px;
    }

    .registro-wrapper {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      padding: 40px;
      animation: slideIn 0.6s ease-out;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .registro-wrapper:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .titulo-registro {
      color: #1a1a1a;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .form {
      display: flex;
      flex-direction: column;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .input-field {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: inherit;
      background: #f9f9f9;
    }

    .input-field:focus {
      outline: none;
      border-color: #1a1a1a;
      box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.08);
      background: white;
    }

    .input-field:hover:not(:focus) {
      border-color: #999;
      background: #fafafa;
    }

    .password-strength {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
      font-weight: 500;
    }

    .strength-weak {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    .strength-medium {
      background: #fff3e0;
      color: #e65100;
      display: block;
    }

    .strength-strong {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    .requirements {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #666;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
    }

    .requirement.met {
      color: #2e7d32;
    }

    .requirement.unmet {
      color: #999;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 15px;
      letter-spacing: 0.3px;
    }

    .btn-submit:hover {
      background: #000;
      transform: scale(1.02);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .mensaje {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .mensaje.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
      border: 1px solid #4caf50;
    }

    .mensaje.error {
      background: #ffebee;
      color: #c62828;
      display: block;
      border: 1px solid #f44336;
    }

    .footer-registro {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .footer-registro p {
      color: #666;
      font-size: 0.95rem;
    }

    .footer-registro a {
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .footer-registro a:hover {
      color: #000;
      text-decoration: underline;
    }

    .info-box {
      background: #f5f5f5;
      border-left: 4px solid #1a1a1a;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #333;
    }

    .info-box strong {
      color: #1a1a1a;
    }

    @media (max-width: 480px) {
      .registro-wrapper {
        padding: 30px 20px;
      }

      .titulo-registro {
        font-size: 1.5rem;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="registro-container">
    <div class="registro-wrapper">
      <h1 class="titulo-registro">📝 Crear Cuenta</h1>
      
      <div class="info-box">
        <strong>ℹ️ Bienvenido!</strong> Completa el formulario para crear tu cuenta y acceder a todas las actividades.
      </div>

      <form id="registroForm" class="form">
        <div class="form-group">
          <label for="usuario">Usuario:</label>
          <input 
            type="text" 
            id="usuario" 
            class="input-field" 
            placeholder="Elige tu nombre de usuario"
            required
            minlength="3"
            maxlength="20"
            autofocus
          >
          <small style="color: #999; font-size: 0.85rem;">
            3-20 caracteres, solo letras, números y guiones
          </small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input 
            type="password" 
            id="password" 
            class="input-field" 
            placeholder="Crea una contraseña segura"
            required
            minlength="6"
          >
          <div class="password-strength" id="passwordStrength"></div>
          
          <div class="requirements" id="requirements">
            <div class="requirement unmet" id="req-length">
              <span>✓</span> Mínimo 6 caracteres
            </div>
            <div class="requirement unmet" id="req-uppercase">
              <span>✓</span> Una letra mayúscula
            </div>
            <div class="requirement unmet" id="req-lowercase">
              <span>✓</span> Una letra minúscula
            </div>
            <div class="requirement unmet" id="req-number">
              <span>✓</span> Un número
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmar">Confirmar Contraseña:</label>
          <input 
            type="password" 
            id="confirmar" 
            class="input-field" 
            placeholder="Repite tu contraseña"
            required
          >
        </div>

        <button type="submit" class="btn-submit">Crear Cuenta</button>

        <div id="mensaje" class="mensaje"></div>
      </form>

      <div class="footer-registro">
        <p>¿Ya tienes cuenta?</p>
        <a href="login.html">Inicia sesión aquí</a>
      </div>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById("password");
    const confirmarInput = document.getElementById("confirmar");
    const formRegistro = document.getElementById("registroForm");
    const mensajeDiv = document.getElementById("mensaje");

    // Validar fortaleza de contraseña
    passwordInput.addEventListener("input", function() {
      const password = this.value;
      const strengthDiv = document.getElementById("passwordStrength");
      
      let strength = 0;
      const requirements = {
        length: password.length >= 6,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /\d/.test(password)
      };

      // Actualizar indicadores
      document.getElementById("req-length").classList.toggle("met", requirements.length);
      document.getElementById("req-uppercase").classList.toggle("met", requirements.uppercase);
      document.getElementById("req-lowercase").classList.toggle("met", requirements.lowercase);
      document.getElementById("req-number").classList.toggle("met", requirements.number);

      // Calcular fortaleza
      Object.values(requirements).forEach(req => {
        if (req) strength++;
      });

      // Mostrar indicador de fortaleza
      strengthDiv.classList.remove("strength-weak", "strength-medium", "strength-strong");
      
      if (password.length === 0) {
        strengthDiv.style.display = "none";
      } else if (strength <= 2) {
        strengthDiv.classList.add("strength-weak");
        strengthDiv.textContent = "⚠️ Contraseña débil";
        strengthDiv.style.display = "block";
      } else if (strength === 3) {
        strengthDiv.classList.add("strength-medium");
        strengthDiv.textContent = "⚠️ Contraseña media";
        strengthDiv.style.display = "block";
      } else {
        strengthDiv.classList.add("strength-strong");
        strengthDiv.textContent = "✅ Contraseña segura";
        strengthDiv.style.display = "block";
      }
    });

    // Validar coincidencia de contraseñas en tiempo real
    confirmarInput.addEventListener("input", function() {
      if (this.value !== passwordInput.value && this.value.length > 0) {
        this.style.borderColor = "#f44336";
      } else if (this.value === passwordInput.value && this.value.length > 0) {
        this.style.borderColor = "#4caf50";
      } else {
        this.style.borderColor = "#ddd";
      }
    });

    // Envío del formulario
    formRegistro.addEventListener("submit", function(event) {
      event.preventDefault();

      const usuario = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value;
      const confirmar = document.getElementById("confirmar").value;

      // Validaciones
      if (usuario.length < 3) {
        mensajeDiv.textContent = "⚠️ El usuario debe tener al menos 3 caracteres";
        mensajeDiv.className = "mensaje error";
        return;
      }

      if (password.length < 6) {
        mensajeDiv.textContent = "⚠️ La contraseña debe tener al menos 6 caracteres";
        mensajeDiv.className = "mensaje error";
        return;
      }

      if (password !== confirmar) {
        mensajeDiv.textContent = "❌ Las contraseñas no coinciden";
        mensajeDiv.className = "mensaje error";
        confirmarInput.focus();
        return;
      }

      // Verificar si el usuario ya existe
      const usuarioExistente = localStorage.getItem("usuario");
      if (usuarioExistente === usuario) {
        mensajeDiv.textContent = "❌ Este usuario ya está registrado";
        mensajeDiv.className = "mensaje error";
        return;
      }

      // Guardar en localStorage
      try {
        localStorage.setItem("usuario", usuario);
        localStorage.setItem("password", password);
        
        mensajeDiv.textContent = "✅ Usuario registrado correctamente. Redirigiendo al login...";
        mensajeDiv.className = "mensaje success";
        
        // Redirigir después de 2 segundos
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      } catch (e) {
        mensajeDiv.textContent = "❌ Error al guardar los datos. Intenta de nuevo.";
        mensajeDiv.className = "mensaje error";
      }
    });

    // Validar que el usuario sea válido (solo letras, números y guiones)
    document.getElementById("usuario").addEventListener("input", function() {
      this.value = this.value.replace(/[^a-zA-Z0-9_-]/g, "");
    });
  </script>
</body>
</html>
