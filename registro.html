<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Neury Salomón">
    <meta name="copyright" content="Neury Hernández">
    <link rel="stylesheet" href="css/registro.css">
  <title>Registro de Usuario</title>
</head>
<body>
  <div class="container">
    <div class="registro-wrapper">
      <h1 class="titulo-registro">Registro</h1>
      <form id="registroForm" class="form">
        <div class="form-group">
          <label for="usuario">Usuario:</label>
          <input type="text" id="usuario" class="input-field" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input type="password" id="password" class="input-field" required>
        </div>

        <button type="submit" class="btn-submit">Registrar</button>
      </form>

      <p id="mensaje" class="mensaje"></p>
    </div>
  </div>

  <script>
    document.getElementById("registroForm").addEventListener("submit", function(event){
      event.preventDefault();

      const usuario = document.getElementById("usuario").value;
      const password = document.getElementById("password").value;

      // Guardar en LocalStorage
      localStorage.setItem("usuario", usuario);
      localStorage.setItem("password", password);

      document.getElementById("mensaje").textContent = "Usuario registrado correctamente.";
      window.location.href = "login.html"; // redirige al login
    });
  </script>
</body>
</html>
